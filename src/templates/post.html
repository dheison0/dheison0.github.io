<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{post.description}" />
    <title>{post.title}</title>
    <link
      rel="shortcut icon"
      href="../images/favicon.svg"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/post.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <script src="../js/dynamic-css-loader.js"></script>
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="eb7c0379-2344-4360-b62f-f5cf333a112c"
    ></script>
  </head>

  <body class="flex flex-col">
    <a href="/" class="header-bar flex-center">
      <img
        src="../images/favicon.svg"
        alt="Letra D maiúscula sendo a inicial do meu nome"
        class="header-icon"
      />
      <span class="header-name">Dheison Gomes</span>
    </a>
    <main class="content flex flex-1 flex-col">
      <h2 class="post-title">{post.title}</h2>
      <span class="post-date">Data de publicação: {post.date}</span>
      <div class="post-content">{content}</div>
    </main>
    <footer class="footer-bar flex-center">
      <span
        >Ícones obtidos no <a href="https://www.svgrepo.com">SVG Repo.</a></span
      >
    </footer>
  </body>
</html>
