<style>
  pre {
    padding: 1rem;
    margin: 1rem;
    border-radius: 0.5rem;
    display: block;
    overflow-x: scroll;
    scrollbar-width: thin;
    scrollbar-color: var(--link-normal-color);
  }

  pre span {
    color: white;
  }

  @media (prefers-color-scheme: dark) {
    pre {
      border: 0.5rem solid var(--project-hover);
    }
  }

  .post-content {
    margin-inline: 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 100vw;
    margin: 0 auto;
    padding-inline: 1rem;
  }

  .post-content div {
    max-width: 64rem;
  }

  .post-content p {
    padding-inline: 0.5rem;
    padding-block: 1rem;
    font-family: Arial, Helvetica, sans-serif;
  }

  .post-content li {
    margin-left: 3.5rem;
    margin-block: 0.4rem;
    list-style-type: circle;
  }

  .post-content h2,
  h3,
  h4 {
    margin-block: 1rem;
  }

  .post-content p img {
    display: block;
    margin: 0 auto;
    max-width: 80%;
  }

  code {
    padding: 0.4rem;
    border-radius: 0.5rem;
    background-color: var(--project-hover);
  }

  pre code {
    margin: 0;
    padding: 0;
  }

  .published {
    color: #aaa;
    margin: 2rem;
  }

  .post-title {
    margin-bottom: 2rem;
    font-size: 3rem;
    text-align: center;
  }
</style>

<div class="center post-content">
  <div>
    <h2 class="center post-title">{{.Title}}</h2>
    {{.Content}}
  </div>
</div>
<div class="published center">Publicado em: {{.Date}}</div>
