<style>
  .container {
    display: flex;
    flex-direction: column;
  }

  .title {
    font-size: 3rem;
    margin-bottom: 2rem;
  }

  .item {
    display: flex;
    flex-direction: row;
    margin: 1rem;
    padding: 1rem;
    border: 0.3rem solid var(--link-normal-color);
    border-radius: 0.7rem;
  }

  .item:hover {
    cursor: hand;
    background-color: var(--project-hover);
  }

  .icon {
    width: 3.5rem;
    margin-right: 1rem;
  }

  @media (prefers-color-scheme: dark) {
    .icon {
      filter: invert();
    }
  }

  .info {
    display: flex;
    flex: 1;
    flex-direction: column;
  }

  .name {
    font-size: 2rem;
  }

  .description {
    font-size: 1.6rem;
    display: block;
    color: var(--link-normal-color);
    text-align: center;
  }
</style>

<div class="container center">
  <h1 class="title">Meus contatos:</h1>
  <div>
    {{range .Items }}
    <a href='{{index . "url"}}' class="item">
      <img src='/assets/icons/social/{{index . "cover"}}.svg' class="icon">
      <div class="info center">
        <h2 class="name">{{index . "title"}}</h2>
        <span class="description">{{index . "description"}}</span>
      </div>
    </a>
    {{end}}
  </div>
</div>
