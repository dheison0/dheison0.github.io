<style>
  .post-list {
    display: flex;
    flex:1;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .post-item {
    display: flex;
    flex: 1;
    flex-direction: row;
    align-items: center;
  }

  .post-title {
    margin: 1rem;
  }

  .post-date {
    color: var(--link-normal-color);
    font-size: 1.3rem;
  }
</style>

<div class="center post-list">
  <div>
    {{ if .Items }}
    {{ range .Items }}
    <a class="post-item" href='/posts/{{ index . "path" }}'>
      <h3 class="post-title">{{ index . "title" }}</h3>
      <span class="post-date">{{ index . "date" }}</span>
    </a>
    {{ end }}
    {{ else }}
    <span>Nenhuma postagem ainda!</span>
    {{ end }}
  </div>
</div>
